<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Get After It!">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>Get After It!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* Exact Jocko cover font: download "Krang" free from dafont.com/krang.font
   then EITHER install it on your device OR put Krang.ttf in the same
   folder as this HTML file. The app uses it automatically. */
@font-face{
  font-family:'Krang';
  src:local('Krang'),local('Krang Regular'),url('Krang.ttf') format('truetype');
  font-display:swap;
}
:root{
  --ink:#000000;
  --panel:#0A0A0A;
  --panel-2:#121212;
  --line:#3A3A3A;
  --paper:#FFFFFF;
  --muted:#8C8C8C;
  --hi:#E5484D;
  --md:#F5A524;
  --lo:#46C666;
  --radius:0px;
  --display:'Krang','Kode Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--ink);color:var(--paper);
  font-family:'OCR A Extended','Kode Mono',ui-monospace,'Courier New',monospace;
  font-size:14px;line-height:1.45;min-height:100%}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input{font:inherit;color:inherit}

/* ---------- header ---------- */
header{padding:calc(26px + env(safe-area-inset-top)) 16px 14px;max-width:680px;margin:0 auto}
.logo{font-family:var(--display);font-weight:700;text-transform:uppercase;
  font-size:clamp(26px,7.5vw,44px);line-height:1.15;letter-spacing:.14em;
  color:var(--paper);word-spacing:.2em}
.logo .bang{color:var(--paper)}
.eyebrow{font-family:var(--display);font-size:12px;font-weight:500;letter-spacing:.3em;
  text-transform:uppercase;color:var(--paper);margin-top:12px}
.tagline{display:flex;align-items:center;gap:12px;margin-top:12px}
.tagline .rule{flex:1;height:1px;background:var(--line)}
.streak{font-family:var(--display);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.14em;
  background:var(--paper);color:var(--ink);padding:4px 10px;white-space:nowrap}
.streak b{font-size:12px}

/* ---------- layout ---------- */
main{max-width:680px;margin:0 auto;padding:4px 12px 120px}

/* ---------- section card ---------- */
.section{background:var(--panel);border:1px solid var(--line);
  border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.sec-head{display:flex;align-items:center;gap:8px;padding:12px 10px 12px 14px;
  cursor:pointer;user-select:none}
.sec-name{font-family:var(--display);font-weight:700;text-transform:uppercase;letter-spacing:.16em;
  font-size:15px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sec-count{font-size:12px;font-weight:700;color:var(--muted);
  background:var(--panel-2);border:1px solid var(--line);
  padding:2px 9px;border-radius:0}
.chev{color:var(--muted);transition:transform .18s;font-size:12px;width:22px;text-align:center}
.section.closed .chev{transform:rotate(-90deg)}
.icon-btn{color:var(--muted);width:34px;height:34px;border-radius:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
.icon-btn:active{background:var(--panel-2)}

.task-list{padding:0 8px}
.section.closed .task-list,.section.closed .adder{display:none}

/* ---------- task row ---------- */
.task{display:flex;align-items:center;gap:6px;
  background:var(--panel-2);border:1px solid var(--line);
  border-left:4px solid var(--line);
  border-radius:0;margin-bottom:8px;padding:9px 4px 9px 8px;
  position:relative}
.task.p-hi{border-left-color:var(--hi)}
.task.p-md{border-left-color:var(--md)}
.task.p-lo{border-left-color:var(--lo)}
.task.dragging{opacity:.25}
.handle{color:var(--muted);font-size:16px;padding:6px 6px;cursor:grab;
  touch-action:none;flex:none;letter-spacing:-1px}
.pri{width:16px;height:16px;border-radius:0;flex:none;margin:0 5px;
  border:2px solid var(--muted);background:transparent;padding:0}
.task.p-hi .pri{background:var(--hi);border-color:var(--hi)}
.task.p-md .pri{background:var(--md);border-color:var(--md)}
.task.p-lo .pri{background:var(--lo);border-color:var(--lo)}
.check{width:22px;height:22px;border-radius:0;flex:none;
  border:2px solid var(--muted);padding:0;position:relative}
.check:active{border-color:var(--lo)}
.t-text{flex:1;min-width:0;word-break:break-word;padding:0 4px;cursor:text;unicode-bidi:plaintext}
.t-text.done{color:var(--muted);text-decoration:line-through}
.t-edit{flex:1;min-width:0;background:var(--ink);border:1px solid var(--md);
  border-radius:0;padding:6px 8px;outline:none}

/* placeholder shown while dragging */
.placeholder{height:44px;border:2px dashed var(--md);border-radius:0;
  margin-bottom:8px;background:rgba(245,165,36,.06)}

/* floating drag ghost */
#ghost{position:fixed;z-index:999;pointer-events:none;width:min(600px,86vw);
  opacity:.92;box-shadow:0 0 0 1px var(--paper),0 12px 30px rgba(0,0,0,.7)}

/* ---------- add task ---------- */
.adder{padding:0 8px 10px}
.add-btn{width:100%;text-align:left;color:var(--muted);font-weight:700;
  padding:9px 10px;border:1px dashed var(--line);border-radius:0}
.add-btn:active{color:var(--paper)}
.add-row{display:flex;gap:8px}
.add-row input{flex:1;min-width:0;background:var(--ink);border:1px solid var(--line);
  border-radius:0;padding:9px 10px;outline:none}
.add-row input:focus{border-color:var(--md)}
.add-row button{font-weight:900;text-transform:uppercase;font-size:12px;
  letter-spacing:.08em;background:var(--paper);color:var(--ink);
  border-radius:0;padding:0 14px}

/* ---------- archive ---------- */
.archive .sec-name{color:var(--muted)}
.archive .t-text{color:var(--muted)}
.mini{color:var(--muted);font-size:16px;width:34px;height:34px;flex:none;
  display:flex;align-items:center;justify-content:center;border-radius:0}
.mini:active{background:var(--panel)}

/* ---------- new section ---------- */
.new-section{font-family:var(--display);width:100%;padding:13px;border:1px dashed var(--line);
  border-radius:var(--radius);color:var(--muted);font-weight:900;
  text-transform:uppercase;letter-spacing:.08em;font-size:13px;margin-bottom:14px}
.new-section:active{color:var(--paper);border-color:var(--muted)}

/* ---------- popup menu ---------- */
#menu{position:fixed;z-index:1000;background:var(--panel-2);
  border:1px solid var(--line);border-radius:0;min-width:190px;
  box-shadow:0 14px 34px rgba(0,0,0,.55);overflow:hidden;display:none}
#menu button{display:block;width:100%;text-align:left;padding:12px 16px;font-weight:500}
#menu button:active{background:var(--panel)}
#menu .danger{color:var(--hi)}
#menu .head{padding:9px 16px 4px;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
#scrim{position:fixed;inset:0;z-index:999;display:none}

.empty-note{color:var(--muted);font-size:13px;padding:2px 10px 12px;font-style:italic}

@media(min-width:700px){ .task{padding:10px 6px 10px 10px} }
@media (prefers-reduced-motion: reduce){ *{transition:none!important} }
</style>
</head>
<body>

<header>
  <div class="logo">Get<br>After<br>It<span class="bang">!</span></div>
  <div class="eyebrow">Field Manual MK1-MOD1</div>
  <div class="tagline">
    <div class="rule"></div>
    <div class="streak"><b id="doneToday">0</b> crushed today</div>
  </div>
</header>

<main>
  <div id="sections"></div>
  <button class="new-section" id="newSection">+ New section</button>
  <div id="archiveWrap"></div>
</main>

<div id="scrim"></div>
<div id="menu"></div>

<script>
'use strict';

/* =============== storage (window.storage → localStorage → memory) =============== */
const KEY='get-after-it-v1';
let memStore=null;
async function loadData(){
  try{ if(window.storage){ const r=await window.storage.get(KEY); if(r&&r.value) return JSON.parse(r.value); } }catch(e){}
  try{ const v=localStorage.getItem(KEY); if(v) return JSON.parse(v); }catch(e){}
  return memStore;
}
let saveTimer=null;
function saveData(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async ()=>{
    const v=JSON.stringify(state);
    memStore=state;
    try{ if(window.storage){ await window.storage.set(KEY,v); return; } }catch(e){}
    try{ localStorage.setItem(KEY,v); }catch(e){}
  },150);
}

/* =============== seed data =============== */
function uid(){ return Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4); }
function T(text,pri){ return {id:uid(),text:text,pri:pri||0}; } // pri: 0 none, 1 low, 2 med, 3 high

function seed(){
  return {
    sections:[
      {id:uid(),name:'Today',open:true,tasks:[
        T('LinkedIn Finland Post',3),
        T('Telegram Automatizer',2)]},
      {id:uid(),name:'This Week',open:true,tasks:[
        T('Cafe Bazaar and Google Play account',2),
        T('Why did some defects increase after annealing?'),
        T('📋 Tax Assistance Service — 730/2026 Return',2),
        T('Build Jarvis AI'),
        T('Partita IVA — PhD/FBK',2)]},
      {id:uid(),name:'This Month',open:false,tasks:[]},
      {id:uid(),name:'This Year',open:false,tasks:[]},
      {id:uid(),name:'Long-Term',open:false,tasks:[
        T('1119 € for Guesthouse'),
        T('YouTube channel / Instagram page with AI (funny + motivational content)'),
        T('NO TOUCH!'),
        T('Buy Apple Tag'),
        T('Finish one work, then go to the next'),
        T('Betting app'),
        T('BANK & LOAN'),
        T('AI Agents'),
        T('Tax Assistance FBK'),
        T('Learning geopolitics'),
        T('Quran understanding'),
        T('Read book بادی‌لنگویج')]},
      {id:uid(),name:'GYM',open:false,tasks:[
        T('Upper chest: low-to-high cable fly + feet-elevated push-ups'),
        T('Lats & V-taper: pull-ups, neutral-grip pulldown, one-arm cable pulldown (elbows to hips)'),
        T('Rear delts: cable rear-delt fly, prone Y-raises'),
        T('Core / abdominal wall'),
        T('Thoracic mobility')]},
      {id:uid(),name:'Work',open:true,tasks:[
        T('Annealing: uncapped with two thermostats (top + bottom) — compare vs capped two-thermostat run',2),
        T('Try Gao-Weber potential for annealing'),
        T('Add to text: cap on top broadens the dopant profile and makes it more uniform through the depth'),
        T('Decompose SiC with NVT slowly to find the decomposition temperature')]},
      {id:uid(),name:'Laplace',open:true,tasks:[
        T('Record videos'),
        T('Before/After of CV'),
        T('Put credentials in .env file',3),
        T('Get statistics data from WhatsApp for customers')]},
      {id:uid(),name:'Study',open:false,tasks:[]}
    ],
    archive:[],
    doneDate:'',
    doneCount:0
  };
}

/* =============== state =============== */
let state=null;
const PRI_CLASS=['','p-lo','p-md','p-hi'];

function todayStr(){ return new Date().toISOString().slice(0,10); }
function bumpDone(n){
  const t=todayStr();
  if(state.doneDate!==t){ state.doneDate=t; state.doneCount=0; }
  state.doneCount=Math.max(0,state.doneCount+n);
}

/* =============== render =============== */
const $sections=document.getElementById('sections');
const $archiveWrap=document.getElementById('archiveWrap');
const $doneToday=document.getElementById('doneToday');

function render(){
  const t=todayStr();
  $doneToday.textContent=(state.doneDate===t)?state.doneCount:0;

  $sections.innerHTML='';
  state.sections.forEach(sec=>$sections.appendChild(renderSection(sec)));
  renderArchive();
}

function renderSection(sec){
  const el=document.createElement('div');
  el.className='section'+(sec.open?'':' closed');
  el.dataset.sid=sec.id;

  const head=document.createElement('div');
  head.className='sec-head';
  head.innerHTML='<span class="chev">▼</span>'+
    '<span class="sec-name"></span>'+
    '<span class="sec-count"></span>';
  head.querySelector('.sec-name').textContent=sec.name;
  head.querySelector('.sec-count').textContent=sec.tasks.length;
  const menuBtn=document.createElement('button');
  menuBtn.className='icon-btn'; menuBtn.textContent='⋯';
  menuBtn.setAttribute('aria-label','Section options');
  menuBtn.addEventListener('click',e=>{ e.stopPropagation(); openSectionMenu(sec,menuBtn); });
  head.appendChild(menuBtn);
  head.addEventListener('click',()=>{ sec.open=!sec.open; saveData(); render(); });
  el.appendChild(head);

  const list=document.createElement('div');
  list.className='task-list'; list.dataset.sid=sec.id;
  sec.tasks.forEach(task=>list.appendChild(renderTask(sec,task)));
  el.appendChild(list);

  // add task
  const adder=document.createElement('div');
  adder.className='adder';
  const addBtn=document.createElement('button');
  addBtn.className='add-btn'; addBtn.textContent='+ Add task';
  addBtn.addEventListener('click',()=>{
    adder.innerHTML='';
    const row=document.createElement('div'); row.className='add-row';
    const inp=document.createElement('input');
    inp.placeholder='What needs to get done?'; inp.dir='auto';
    const go=document.createElement('button'); go.textContent='Add';
    const commit=()=>{
      const v=inp.value.trim();
      if(v){ sec.tasks.push(T(v)); saveData(); }
      render();
    };
    go.addEventListener('click',commit);
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter') commit();
      if(e.key==='Escape') render();
    });
    row.appendChild(inp); row.appendChild(go);
    adder.appendChild(row);
    inp.focus();
  });
  adder.appendChild(addBtn);
  el.appendChild(adder);
  return el;
}

function renderTask(sec,task){
  const row=document.createElement('div');
  row.className='task '+PRI_CLASS[task.pri||0];
  row.dataset.tid=task.id;

  const handle=document.createElement('div');
  handle.className='handle'; handle.textContent='⠿';
  handle.setAttribute('aria-label','Drag to reorder');
  handle.addEventListener('pointerdown',e=>startDrag(e,sec,task,row));
  row.appendChild(handle);

  const pri=document.createElement('button');
  pri.className='pri'; pri.setAttribute('aria-label','Cycle priority');
  pri.addEventListener('click',()=>{
    task.pri=((task.pri||0)+1)%4;
    saveData(); render();
  });
  row.appendChild(pri);

  const txt=document.createElement('div');
  txt.className='t-text'; txt.dir='auto'; txt.textContent=task.text;
  txt.addEventListener('click',()=>inlineEdit(row,txt,task));
  row.appendChild(txt);

  const check=document.createElement('button');
  check.className='check'; check.setAttribute('aria-label','Mark done');
  check.addEventListener('click',()=>{
    sec.tasks=sec.tasks.filter(x=>x.id!==task.id);
    state.archive.unshift({id:task.id,text:task.text,pri:task.pri,from:sec.name,at:todayStr()});
    bumpDone(1);
    saveData(); render();
  });
  row.appendChild(check);

  const menuBtn=document.createElement('button');
  menuBtn.className='icon-btn'; menuBtn.textContent='⋯';
  menuBtn.setAttribute('aria-label','Task options');
  menuBtn.addEventListener('click',()=>openTaskMenu(sec,task,menuBtn));
  row.appendChild(menuBtn);

  return row;
}

function inlineEdit(row,txt,task){
  const inp=document.createElement('input');
  inp.className='t-edit'; inp.value=task.text; inp.dir='auto';
  row.replaceChild(inp,txt);
  inp.focus(); inp.setSelectionRange(inp.value.length,inp.value.length);
  const done=save=>{
    if(save){ const v=inp.value.trim(); if(v) task.text=v; saveData(); }
    render();
  };
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter') done(true);
    if(e.key==='Escape') done(false);
  });
  inp.addEventListener('blur',()=>done(true));
}

function renderArchive(){
  $archiveWrap.innerHTML='';
  const el=document.createElement('div');
  el.className='section archive'+(state.archiveOpen?'':' closed');
  const head=document.createElement('div');
  head.className='sec-head';
  head.innerHTML='<span class="chev">▼</span><span class="sec-name">✓ Crushed</span><span class="sec-count"></span>';
  head.querySelector('.sec-count').textContent=state.archive.length;
  head.addEventListener('click',()=>{ state.archiveOpen=!state.archiveOpen; saveData(); render(); });
  el.appendChild(head);

  const list=document.createElement('div');
  list.className='task-list';
  if(!state.archive.length){
    const n=document.createElement('div');
    n.className='empty-note'; n.textContent='Nothing crushed yet. Get after it.';
    list.appendChild(n);
  }
  state.archive.forEach(item=>{
    const row=document.createElement('div');
    row.className='task';
    const txt=document.createElement('div');
    txt.className='t-text done'; txt.dir='auto'; txt.textContent=item.text;
    row.appendChild(txt);

    const back=document.createElement('button');
    back.className='mini'; back.textContent='↩';
    back.setAttribute('aria-label','Restore task');
    back.addEventListener('click',()=>{
      state.archive=state.archive.filter(x=>x.id!==item.id);
      let sec=state.sections.find(s=>s.name===item.from)||state.sections[0];
      if(sec){ sec.tasks.push({id:item.id,text:item.text,pri:item.pri||0}); sec.open=true; }
      if(item.at===todayStr()) bumpDone(-1);
      saveData(); render();
    });
    row.appendChild(back);

    const del=document.createElement('button');
    del.className='mini'; del.textContent='✕';
    del.setAttribute('aria-label','Delete forever');
    del.addEventListener('click',()=>{
      state.archive=state.archive.filter(x=>x.id!==item.id);
      saveData(); render();
    });
    row.appendChild(del);
    list.appendChild(row);
  });
  el.appendChild(list);
  $archiveWrap.appendChild(el);
}

/* =============== menus =============== */
const $menu=document.getElementById('menu');
const $scrim=document.getElementById('scrim');
function closeMenu(){ $menu.style.display='none'; $scrim.style.display='none'; }
$scrim.addEventListener('click',closeMenu);

function showMenuAt(anchor){
  $menu.style.display='block'; $scrim.style.display='block';
  const r=anchor.getBoundingClientRect();
  const mw=$menu.offsetWidth,mh=$menu.offsetHeight;
  let x=Math.min(r.left,window.innerWidth-mw-10);
  let y=r.bottom+6;
  if(y+mh>window.innerHeight-10) y=Math.max(10,r.top-mh-6);
  $menu.style.left=Math.max(10,x)+'px';
  $menu.style.top=y+'px';
}
function menuItem(label,fn,cls){
  const b=document.createElement('button');
  b.textContent=label; if(cls)b.className=cls;
  b.addEventListener('click',()=>{ closeMenu(); fn(); });
  return b;
}

function openTaskMenu(sec,task,anchor){
  $menu.innerHTML='';
  const head=document.createElement('div'); head.className='head'; head.textContent='Move to…';
  $menu.appendChild(head);
  state.sections.forEach(s=>{
    if(s.id===sec.id) return;
    $menu.appendChild(menuItem('→ '+s.name,()=>{
      sec.tasks=sec.tasks.filter(x=>x.id!==task.id);
      s.tasks.push(task); s.open=true;
      saveData(); render();
    }));
  });
  $menu.appendChild(menuItem('✎ Edit text',()=>{
    const row=document.querySelector('.task[data-tid="'+task.id+'"]');
    if(row){ const txt=row.querySelector('.t-text'); if(txt) inlineEdit(row,txt,task); }
  }));
  $menu.appendChild(menuItem('✕ Delete',()=>{
    sec.tasks=sec.tasks.filter(x=>x.id!==task.id);
    saveData(); render();
  },'danger'));
  showMenuAt(anchor);
}

function openSectionMenu(sec,anchor){
  $menu.innerHTML='';
  $menu.appendChild(menuItem('✎ Rename',()=>{
    const v=prompt('Section name:',sec.name);
    if(v&&v.trim()){ sec.name=v.trim(); saveData(); render(); }
  }));
  const idx=state.sections.indexOf(sec);
  if(idx>0) $menu.appendChild(menuItem('↑ Move section up',()=>{
    state.sections.splice(idx,1); state.sections.splice(idx-1,0,sec);
    saveData(); render();
  }));
  if(idx<state.sections.length-1) $menu.appendChild(menuItem('↓ Move section down',()=>{
    state.sections.splice(idx,1); state.sections.splice(idx+1,0,sec);
    saveData(); render();
  }));
  $menu.appendChild(menuItem('✕ Delete section',()=>{
    const n=sec.tasks.length;
    if(n&&!confirm('Delete "'+sec.name+'" and its '+n+' task(s)?')) return;
    state.sections=state.sections.filter(s=>s.id!==sec.id);
    saveData(); render();
  },'danger'));
  showMenuAt(anchor);
}

document.getElementById('newSection').addEventListener('click',()=>{
  const v=prompt('New section name:');
  if(v&&v.trim()){
    state.sections.push({id:uid(),name:v.trim(),open:true,tasks:[]});
    saveData(); render();
  }
});

/* =============== drag & drop (pointer events: mouse + touch) =============== */
let drag=null; // {task, fromSec, ghost, placeholder}

function startDrag(e,sec,task,row){
  e.preventDefault();
  const ghost=row.cloneNode(true);
  ghost.id='ghost';
  const rect=row.getBoundingClientRect();
  ghost.style.width=rect.width+'px';
  document.body.appendChild(ghost);

  const placeholder=document.createElement('div');
  placeholder.className='placeholder';
  row.parentNode.insertBefore(placeholder,row);
  row.classList.add('dragging');
  row.style.display='none';

  drag={task,fromSec:sec,ghost,placeholder,offX:e.clientX-rect.left,offY:e.clientY-rect.top,row};
  moveGhost(e.clientX,e.clientY);

  window.addEventListener('pointermove',onDragMove);
  window.addEventListener('pointerup',onDragEnd,{once:true});
  window.addEventListener('pointercancel',onDragEnd,{once:true});
}

function moveGhost(x,y){
  drag.ghost.style.left=(x-drag.offX)+'px';
  drag.ghost.style.top=(y-drag.offY)+'px';
}

function onDragMove(e){
  if(!drag) return;
  e.preventDefault();
  moveGhost(e.clientX,e.clientY);

  // auto-scroll near screen edges
  const m=70;
  if(e.clientY<m) window.scrollBy(0,-12);
  else if(e.clientY>window.innerHeight-m) window.scrollBy(0,12);

  const under=document.elementFromPoint(e.clientX,e.clientY);
  if(!under) return;

  // opening a closed section by hovering its header
  const secEl=under.closest&&under.closest('.section');
  if(secEl&&secEl.classList.contains('closed')&&!secEl.classList.contains('archive')){
    const s=state.sections.find(x=>x.id===secEl.dataset.sid);
    if(s){ s.open=true; secEl.classList.remove('closed'); }
  }

  const overTask=under.closest&&under.closest('.task:not(.dragging)');
  if(overTask&&overTask.parentNode.classList.contains('task-list')&&overTask.parentNode.dataset.sid){
    const r=overTask.getBoundingClientRect();
    const before=e.clientY<r.top+r.height/2;
    overTask.parentNode.insertBefore(drag.placeholder,before?overTask:overTask.nextSibling);
    return;
  }
  const overList=under.closest&&under.closest('.task-list');
  if(overList&&overList.dataset.sid&&!overList.contains(drag.placeholder)){
    overList.appendChild(drag.placeholder);
  }
}

function onDragEnd(){
  window.removeEventListener('pointermove',onDragMove);
  if(!drag) return;
  const list=drag.placeholder.parentNode;
  const toSid=list&&list.dataset?list.dataset.sid:null;
  const toSec=state.sections.find(s=>s.id===toSid);

  if(toSec){
    // index = number of task rows before the placeholder
    let idx=0;
    for(const child of list.children){
      if(child===drag.placeholder) break;
      if(child.classList.contains('task')&&child.style.display!=='none') idx++;
    }
    drag.fromSec.tasks=drag.fromSec.tasks.filter(x=>x.id!==drag.task.id);
    toSec.tasks.splice(Math.min(idx,toSec.tasks.length),0,drag.task);
    saveData();
  }
  drag.ghost.remove();
  drag.placeholder.remove();
  drag=null;
  render();
}

/* =============== boot =============== */
(async function(){
  state=await loadData();
  if(!state||!state.sections){ state=seed(); saveData(); }
  if(state.archiveOpen===undefined) state.archiveOpen=false;
  render();
  // offline support (only runs when served over https, e.g. GitHub Pages)
  try{
    if('serviceWorker' in navigator && location.protocol==='https:')
      navigator.serviceWorker.register('sw.js');
  }catch(e){}
})();
</script>
